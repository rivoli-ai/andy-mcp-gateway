<!-- Login Page -->
<div *ngIf="!auth.loggedIn()" class="login-wrapper">
  <router-outlet></router-outlet>
</div>

<!-- Main App -->
<div *ngIf="auth.loggedIn()" class="app-container" [class.app-sidebar-collapsed]="sidebarCollapsed && !isNarrowViewport">
  <aside class="sidebar" [class.sidebar-collapsed]="sidebarCollapsed">
    <header class="sidebar-header">
      <div class="sidebar-header__top">
        <a routerLink="/dashboard" class="sidebar-brand" title="Home">
          <div class="sidebar-brand__mark" aria-hidden="true">
            <svg class="logo-icon" width="22" height="22" viewBox="0 0 32 32" fill="none">
              <rect width="32" height="32" rx="8" fill="url(#sidebarLogoGrad)"/>
              <path d="M8 12h16v2H8v-2zm0 4h16v2H8v-2zm0 4h12v2H8v-2z" fill="white"/>
              <defs>
                <linearGradient id="sidebarLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#6366f1"/>
                  <stop offset="50%" stop-color="#8b5cf6"/>
                  <stop offset="100%" stop-color="#a855f7"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="sidebar-brand__text" *ngIf="!sidebarCollapsed">
            <span class="sidebar-brand__name">MCP Gateway</span>
            <span class="sidebar-brand__tagline">Control plane</span>
          </div>
        </a>
        <button
          type="button"
          class="sidebar-collapse-toggle"
          (click)="toggleSidebar()"
          [attr.aria-label]="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
          [attr.aria-expanded]="!sidebarCollapsed"
          [title]="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
        >
          <svg *ngIf="sidebarCollapsed" class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="11 6 16 12 11 18"/>
          </svg>
          <svg *ngIf="!sidebarCollapsed" class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="13 6 8 12 13 18"/>
          </svg>
        </button>
      </div>
    </header>

    <nav class="sidebar-nav scrollbar-thin" aria-label="Main navigation">
      <div class="nav-section">
        <p class="nav-section-title" *ngIf="!sidebarCollapsed">Navigate</p>
        <ul class="nav-list">
          <li>
            <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" aria-label="Dashboard">
              <span class="nav-item__icon" aria-hidden="true">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                  <rect x="3" y="3" width="7" height="7" rx="1"/>
                  <rect x="14" y="3" width="7" height="7" rx="1"/>
                  <rect x="14" y="14" width="7" height="7" rx="1"/>
                  <rect x="3" y="14" width="7" height="7" rx="1"/>
                </svg>
              </span>
              <span class="nav-label" *ngIf="!sidebarCollapsed">Dashboard</span>
            </a>
          </li>
          <li>
            <a routerLink="/adapters" routerLinkActive="active" class="nav-item" aria-label="Adapters">
              <span class="nav-item__icon" aria-hidden="true">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                  <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
              </span>
              <span class="nav-label" *ngIf="!sidebarCollapsed">Adapters</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <footer class="sidebar-footer">
      <div class="sidebar-user" [class.sidebar-user--collapsed]="sidebarCollapsed">
        <div class="sidebar-user__avatar" [attr.title]="auth.user()?.name || auth.user()?.email || 'User'">
          {{ getUserInitials() }}
        </div>
        <div class="sidebar-user__meta" *ngIf="!sidebarCollapsed">
          <span class="sidebar-user__name">{{ auth.user()?.name || auth.user()?.email || 'User' }}</span>
          <span class="sidebar-user__email">{{ auth.user()?.email || '' }}</span>
        </div>
      </div>
      <button type="button" *ngIf="!sidebarCollapsed" class="logout-button" (click)="logout()">
        <svg class="logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16,17 21,12 16,7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Sign out</span>
      </button>
      <button
        type="button"
        *ngIf="sidebarCollapsed"
        class="logout-button logout-button--icon"
        (click)="logout()"
        title="Sign out"
        aria-label="Sign out"
      >
        <svg class="logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16,17 21,12 16,7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </footer>
  </aside>

  <div class="app-content">
    <header class="header">
      <div class="header-content">
        <button type="button" class="menu-toggle" (click)="toggleSidebar()" aria-label="Toggle menu">
          <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="header-title">
          <h1 class="page-title">{{ getPageTitle() }}</h1>
        </div>
        <div class="header-actions">
          <button
            type="button"
            class="theme-toggle header-theme-toggle"
            (click)="toggleTheme()"
            [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'"
          >
            <svg *ngIf="!isDarkMode" class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <svg *ngIf="isDarkMode" class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div class="page-content">
      <div class="loading-overlay" *ngIf="isLoading">
        <div class="loading-spinner">
          <div class="loading"></div>
          <p>Loading...</p>
        </div>
      </div>
      <router-outlet></router-outlet>
    </div>
  </div>

  <div
    class="sidebar-overlay"
    *ngIf="isNarrowViewport && !sidebarCollapsed"
    (click)="closeSidebarDrawer()"
  ></div>
</div>

<app-notification></app-notification>
