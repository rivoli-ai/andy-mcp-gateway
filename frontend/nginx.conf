server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — resolve upstream at request time so nginx does not fail at startup
    # when mcpgateway-backend is not yet registered ("host not found in upstream").
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST + auth under /api
    location /api {
        set $mcp_backend mcpgateway-backend;
        proxy_pass http://$mcp_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # MCP proxy (SSE + streamable HTTP) — not under /api
    location /adapters {
        set $mcp_backend mcpgateway-backend;
        proxy_pass http://$mcp_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /health {
        set $mcp_backend mcpgateway-backend;
        proxy_pass http://$mcp_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
